<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>記帳本</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;margin:0}
.container{max-width:420px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
.btn{border:none;padding:14px;border-radius:12px;font-size:16px}
.btn-primary{background:#6c63ff;color:#fff}
.center-btn{display:block;margin:14px auto;width:90%;max-width:320px;text-align:center;border-radius:12px}
.entry{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.entry:last-child{border-bottom:none}
.entry-name{font-weight:600}
.entry-meta{font-size:12px;color:#888}
.entry-amt{font-weight:700}
.expense{color:#e74c3c}
.badge{font-size:10px;padding:2px 6px;border-radius:6px;margin-left:4px}
.badge-recurring{background:#ffe5b4}
.badge-synced{background:#d4edda}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>📘 記帳本</h2>
<button class="btn btn-primary center-btn" onclick="testNotion()">測試 Notion 連線</button>
<button class="btn center-btn" onclick="syncAll()">同步所有未上傳記錄</button>
</div>

<div class="card">
<h3>每月固定項目</h3>
<div id="rec-summary"></div>
</div>

<div class="card">
<h3>最近記錄</h3>
<div id="entry-list"></div>
</div>

</div>

<script>
let entries = [];

async function fetchNotion(){
  const res = await fetch('/api/notion',{method:'GET'});
  const data = await res.json();

  entries = data.map((p,idx)=>{
    const props=p.properties;
    return {
      id: idx+1,
      desc: props['名稱']?.title?.[0]?.plain_text || '未命名',
      amount: props['金額']?.number || 0,
      currency: props['幣別']?.select?.name || 'TWD',
      twd: props['台幣金額']?.number || 0,
      cat: props['類別']?.select?.name || '其他',
      date: props['日期']?.date?.start || '',
      type: props['類型']?.select?.name || '支出',
      isRecurring: props['是否固定']?.checkbox || false,
      notionSynced:true
    }
  })

  render();
}

function render(){
  renderRec();
  renderList();
}

function renderRec(){
  const el=document.getElementById('rec-summary');
  const fixed=entries.filter(e=>e.isRecurring);

  if(!fixed.length){
    el.innerHTML='沒有固定支出';
    return;
  }

  el.innerHTML=fixed.map(e=>`
    <div class="entry">
      <div>
        <div class="entry-name">${e.desc}</div>
        <div class="entry-meta">每月固定</div>
      </div>
      <div class="entry-amt expense">-${e.currency==='JPY'?'¥':'NT$'}${e.amount}</div>
    </div>
  `).join('');
}

function renderList(){
  const el=document.getElementById('entry-list');

  el.innerHTML=entries.map(e=>`
    <div class="entry">
      <div>
        <div class="entry-name">${e.desc}</div>
        <div class="entry-meta">${e.cat} ${e.isRecurring?'<span class="badge badge-recurring">固定</span>':''}</div>
      </div>
      <div class="entry-amt expense">-${e.currency==='JPY'?'¥':'NT$'}${e.amount}</div>
    </div>
  `).join('');
}

async function testNotion(){
  await fetchNotion();
  alert('成功');
}

async function syncAll(){
  alert('已同步（Notion為主）');
}

fetchNotion();
</script>

</body>
</html>
